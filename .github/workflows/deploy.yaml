name: Deploy Quartz to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Install plugins
        run: |
          echo "=== install-plugins output ===" 
          npm run install-plugins 2>&1 | tee plugins.log
          echo "=== exit code: $? ==="
      - name: Upload plugins log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: plugins-log
          path: plugins.log
      - name: Build Quartz
        run: npx quartz build
      - name: Check build output
        run: |
          echo "=== public files ===" && ls public/ 2>&1 | head -10
          echo "=== html count ===" && ls public/*.html 2>&1 | wc -l
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
