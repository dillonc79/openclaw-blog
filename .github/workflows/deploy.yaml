name: Deploy Quartz to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          npm ci 2>&1 || { echo "npm ci failed"; exit 1; }
      - name: Install plugins
        run: |
          npm run install-plugins 2>&1 || echo "install-plugins failed, continuing..."
      - name: Build Quartz
        run: |
          npx quartz build 2>&1 | tee build.log
          echo "---BUILD EXIT CODE: $?"
      - name: Show build log on failure
        if: failure()
        run: cat build.log
      - uses: actions/upload-pages-artifact@v3
        if: success()
        with:
          path: public
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
