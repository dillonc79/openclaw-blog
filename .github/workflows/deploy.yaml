name: Deploy Quartz to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Install plugins
        run: |
          node --experimental-strip-types --no-warnings quartz/bootstrap-cli.mjs plugin install 2>&1 || {
            echo "plugin install failed, trying alternative..."
            npm run install-plugins 2>&1
          }
      - name: Build Quartz
        run: |
          node --experimental-strip-types --no-warnings quartz/bootstrap-cli.mjs build 2>&1
          echo "Build exit code: $?"
      - name: Check output
        run: |
          echo "=== public dir ===" && ls public/ 2>&1 | head -10
          echo "=== html count ===" && ls public/*.html 2>&1 | wc -l
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
